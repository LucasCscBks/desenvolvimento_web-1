<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administração | Login</title>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            color: #f4f7fb;
            background-image: linear-gradient(rgba(8, 14, 29, 0.82), rgba(8, 14, 29, 0.82)), url('../x-men_background.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        header,
        nav,
        main,
        footer {
            width: min(1100px, calc(100% - 2rem));
            margin: 0 auto;
        }

        header {
            padding: 2rem 0 1rem;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            padding: 1rem 0 2rem;
        }

        nav a,
        nav summary {
            color: #f4f7fb;
            text-decoration: none;
            background: rgba(11, 23, 51, 0.84);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 999px;
            padding: 0.7rem 1rem;
            cursor: pointer;
        }

        nav a:hover,
        nav summary:hover {
            background: #d6a21f;
            color: #111827;
        }

        nav details ul {
            list-style: none;
            padding: 0.75rem 0 0;
            margin: 0;
            display: grid;
            gap: 0.5rem;
        }

        nav details a {
            display: inline-block;
            width: 100%;
        }

        main {
            padding: 0 0 2rem;
            display: grid;
            place-items: center;
        }

        .card {
            width: min(560px, 100%);
            background: rgba(8, 14, 29, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 1.75rem;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.28);
        }

        label {
            display: block;
            margin: 0.9rem 0 0.35rem;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 0.85rem 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.08);
            color: #f4f7fb;
        }

        button,
        .button-link {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.85rem 1.2rem;
            border-radius: 999px;
            border: 0;
            background: #d6a21f;
            color: #111827;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        footer {
            padding: 1rem 0 2rem;
            font-size: 0.95rem;
        }

        footer a {
            color: #f7d66a;
        }
    </style>
</head>
<body>
    <header>
        <h1>Área de Administração</h1>
        <p>Autenticação para acesso às páginas administrativas</p>
    </header>

    <nav>
        <a href="../index.html">Home</a>
        <a href="login.html">Login</a>
        <details>
            <summary>Administração</summary>
            <ul>
                <li><a href="temas.html">Cadastro de objetos tema</a></li>
                <li><a href="usuarios.html">Cadastro de usuários</a></li>
            </ul>
        </details>
        <a href="../sobre.html">Autor</a>
    </nav>

    <main>
        <section class="card">
            <h2>Página de Login</h2>
            <form>
                <label for="login-email">E-mail</label>
                <input id="login-email" name="email" type="email" placeholder="admin@exemplo.com">

                <label for="login-senha">Senha</label>
                <input id="login-senha" name="senha" type="password" placeholder="Digite sua senha">

                <button type="submit">Entrar</button>
            </form>
        </section>
    </main>

    <footer>
        <p>Desenvolvido por <a href="../sobre.html">Lucas Sousa Reis</a></p>
    </footer>
</body>
</html>
